<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FriendFollowOfficial</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  height:100vh;
  overflow:hidden;
  font-family:'Kanit',sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at top, #ffd6e0, #ff8fab);
}

/* เอฟเฟกต์เปิดแบบ iPhone */
body.active {
  animation: zoom 0.8s ease forwards;
}
@keyframes zoom {
  from {transform: scale(1.2); opacity:0;}
  to {transform: scale(1); opacity:1;}
}

/* กล่องหลัก */
.card {
  text-align:center;
  padding:40px;
  border-radius:25px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(15px);
  box-shadow: 0 0 40px rgba(255,255,255,0.3);
}

/* โลโก้ 3D */
.logo {
  font-size:30px;
  font-weight:900;
  color:white;
  text-shadow:
    0 3px 0 #ff4d6d,
    0 8px 20px rgba(0,0,0,0.3);
  animation: float 2s infinite;
}
@keyframes float {
  0%,100% {transform: translateY(0);}
  50% {transform: translateY(-10px);}
}

.sub {
  margin-top:10px;
  font-size:14px;
  opacity:0.9;
  color:white;
}

/* ปุ่ม */
.btn {
  margin-top:25px;
  padding:12px 30px;
  border:none;
  border-radius:30px;
  background:white;
  color:#ff4d6d;
  font-weight:700;
  cursor:pointer;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* โหลด */
.loader {
  margin-top:25px;
  display:none;
}

.gacha {
  font-size:40px;
  animation: spin 1s linear infinite;
}
@keyframes spin {
  to {transform: rotate(360deg);}
}

.percent {
  margin-top:10px;
  font-weight:700;
  color:white;
}

/* sparkle */
.sparkle {
  position:absolute;
  width:5px;
  height:5px;
  background:white;
  border-radius:50%;
  animation: sparkle 3s infinite;
}
@keyframes sparkle {
  0% {opacity:1; transform:translateY(0);}
  100% {opacity:0; transform:translateY(-200px);}
}
</style>
</head>

<body>

<div class="card">
  <div class="logo">✨ FriendFollowOfficial</div>
  <div class="sub">Premium Gacha System</div>

  <button class="btn" id="enter">เข้าสู่ระบบ</button>

  <div class="loader" id="loader">
    <div class="gacha">🎁</div>
    <div class="percent" id="percent">0%</div>
  </div>
</div>

<!-- เสียง -->
<audio id="sound1" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3"></audio>
<audio id="sound2" src="https://cdn.pixabay.com/download/audio/2022/03/10/audio_5c6c13b9ff.mp3"></audio>

<script>
const btn = document.getElementById("enter");
const loader = document.getElementById("loader");
const percentEl = document.getElementById("percent");

const s1 = document.getElementById("sound1");
const s2 = document.getElementById("sound2");

btn.onclick = () => {
  document.body.classList.add("active");

  s1.play().catch(()=>{});

  btn.style.display = "none";
  loader.style.display = "block";

  let p = 0;

  let interval = setInterval(()=>{
    p++;
    percentEl.innerText = p + "%";

    if(p == 40) s2.play().catch(()=>{});

    if(p >= 100){
      clearInterval(interval);

      // กันยิงตรงเล็กน้อย
      localStorage.setItem("ff_enter","yes");

      setTimeout(()=>{
        window.location.href = "https://script.google.com/macros/s/AKfycbwzs1dv4Twoz6RVy5IKm07bG3L8JlDcdbIYV7s0YbxnCvMbEDPQVXK2FUwexzEQW2G4/exec";
      },500);
    }

  },20);
};

// sparkle
for(let i=0;i<35;i++){
  let s=document.createElement("div");
  s.className="sparkle";
  s.style.left=Math.random()*window.innerWidth+"px";
  s.style.top=Math.random()*window.innerHeight+"px";
  s.style.animationDuration=(2+Math.random()*3)+"s";
  document.body.appendChild(s);
}
</script>

</body>
</html>
